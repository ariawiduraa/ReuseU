name: reuseu
description: ReuseU - Marketplace Barang Bekas Mahasiswa
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Fonts
  google_fonts: ^6.3.0

  # State Management
  provider: ^6.1.5

  # Image Picker
  image_picker: ^1.2.0

  # Carousel Banner
  carousel_slider: ^5.1.1

  # Icon
  font_awesome_flutter: ^10.10.0

  # Cached Image
  cached_network_image: ^3.4.1

  # Supabase
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter_native_splash:
  color: "#DBCAB9"
  image: assets/images/splash.png
  fullscreen: true

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/logo/

  # Jika nanti memakai font sendiri
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700